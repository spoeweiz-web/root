<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="600">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Diashow</title>

    <style>
        /* 🌙 Immer Dark Mode erzwingen */
        html {
            color-scheme: dark;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        /* 📺 Container passt sich immer an */
        #container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 🎬 iframe füllt immer den Bildschirm */
        iframe {
            position: absolute;
            top: -50px;
            left: 0;
            width: 100vw;
            height: calc(100vh + 100px);
            border: none;
        }

        /* 🟢 Statusanzeige */
        #status {
            position: fixed;
            bottom: 10px;
            right: 15px;
            z-index: 999999;
            color: lime;
            font-size: 16px;
            font-family: Arial, sans-serif;
            background: rgba(0,0,0,0.6);
            padding: 6px 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div id="container">
    <iframe
        src="https://docs.google.com/presentation/d/e/2PACX-1vQvq2VBI9GmAPamOlMXpkqfGnAuwao2Ca8bfQaVQMOSc6ZBqUNgS4cH1L5AFXSEaPlUHBsLO-GodEbZ/pub?start=true&loop=true&delayms=10000">
    </iframe>
</div>

<div id="status">lädt...</div>

<script>
    /* ⏰ Live Uhr */
    function updateStatus() {
        const now = new Date();
        document.getElementById("status").innerText =
            "läuft – " + now.toLocaleTimeString();
    }

    setInterval(updateStatus, 1000);
    updateStatus();

    /* 🔁 Reload alle 10 Minuten */
    setTimeout(() => {
        location.reload();
    }, 600000);
</script>

</body>
</html>
