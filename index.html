<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="600">
    <title>TV Diashow</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: -60px;   /* oben abschneiden */
            left: 0;
            width: 100%;
            height: calc(100% + 60px); /* oben + unten größer */
            border: none;
        }

        #status {
            position: fixed;
            bottom: 10px;
            right: 15px;
            color: lime;
            font-size: 16px;
            font-family: Arial, sans-serif;
            z-index: 9999;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div id="container">
        <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQvq2VBI9GmAPamOlMXpkqfGnAuwao2Ca8bfQaVQMOSc6ZBqUNgS4cH1L5AFXSEaPlUHBsLO-GodEbZ/pubembed?start=true&loop=true&delayms=10000" frameborder="0" width="1440" height="839" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>

    </div>



</body>
</html>
